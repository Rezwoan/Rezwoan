name: Generate Custom Htop Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate htop stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = context.repo.owner;
            
            // 1. Fetch User Data
            const { data: user } = await github.rest.users.getByUsername({ username });
            
            // 2. Calculate Uptime
            const joinDate = new Date(user.created_at);
            const now = new Date();
            const diffTime = Math.abs(now - joinDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const joinYear = joinDate.getFullYear();
            
            // 3. Fetch Repos & Stars
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username,
              type: 'owner'
            });
            const totalStars = repos.filter(r => !r.fork).reduce((acc, r) => acc + r.stargazers_count, 0);
            const totalForks = repos.filter(r => !r.fork).reduce((acc, r) => acc + r.forks_count, 0);
            
            // 4. Fetch Commits (using Search API)
            let totalCommits = 0;
            try {
              const { data: commits } = await github.rest.search.commits({
                q: `author:${username}`
              });
              totalCommits = commits.total_count;
            } catch (e) {
              console.log('Commits search failed, defaulting to 0:', e.message);
            }
            
            // 4.5 Fetch Contribution Calendar (GraphQL for Streaks)
            const query = `
              query($userName:String!) {
                user(login: $userName){
                  contributionsCollection {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          contributionCount
                          date
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            let longestStreak = { count: 0, start: '', end: '' };
            let currentStreak = { count: 0, start: '', end: '' };
            
            try {
              const variables = { userName: username };
              const result = await github.graphql(query, variables);
              const weeks = result.user.contributionsCollection.contributionCalendar.weeks;
              
              let temp = { count: 0, start: '', end: '' };
              let lastDayHasCommits = false;
              
              weeks.forEach(week => {
                week.contributionDays.forEach(day => {
                  lastDayHasCommits = day.contributionCount > 0;
                  if (day.contributionCount > 0) {
                    if (temp.count === 0) temp.start = day.date;
                    temp.count++;
                    temp.end = day.date;
                    currentStreak = { ...temp };
                  } else {
                    if (temp.count > longestStreak.count) longestStreak = { ...temp };
                    temp = { count: 0, start: '', end: '' };
                    currentStreak = { count: 0, start: '', end: '' };
                  }
                });
              });
              if (temp.count > longestStreak.count) longestStreak = { ...temp };
              // If the very last tracked day (today) has 0 commits, the current streak is broken. 
              if (!lastDayHasCommits) {
                 currentStreak = { count: 0, start: 'N/A', end: 'N/A' };
              }
              
              const fmtDate = (d) => d && d !== 'N/A' ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric'}) : '--';
              longestStreak.display = `${longestStreak.count} days (${fmtDate(longestStreak.start)} - ${fmtDate(longestStreak.end)})`;
              currentStreak.display = `${currentStreak.count} days (${fmtDate(currentStreak.start)} - ${fmtDate(currentStreak.end)})`;
            } catch (error) {
              console.log('GraphQL streak fetch failed:', error);
              longestStreak.display = 'Unavailable';
              currentStreak.display = 'Unavailable';
            }

            // 5. Calculate Metrics
            const cpuUsage = Math.floor(Math.random() * 40) + 10; // Randomize load for aesthetics
            const memUsage = Math.min(100, Math.round((repos.length / 100) * 100)); // Repos vs 100%
            const swpUsage = Math.min(100, Math.round((totalCommits / 2000) * 100)); // Commits vs 2k capacity

            // 6. Format SVG Bars
            const w = 18; // width in chars for bar
            const cpuFill = Math.round((cpuUsage / 100) * w);
            const memFill = Math.round((memUsage / 100) * w);
            const swpFill = Math.round((swpUsage / 100) * w);
            
            const cpuBar = '|'.repeat(cpuFill) + ' '.repeat(w - cpuFill);
            const memBar = '|'.repeat(memFill) + ' '.repeat(w - memFill);
            const swpBar = '|'.repeat(swpFill) + ' '.repeat(w - swpFill);

            // 6. Generate SVG Image
            const svg = `
            <svg width="680" height="270" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 270">
              <rect width="100%" height="100%" fill="#0d1117" rx="10" stroke="#39FF14" stroke-width="1"/>
              <style>
                .txt { font-family: 'Courier New', monospace; font-size: 14px; fill: #ffffff; }
                .green { fill: #39FF14; font-weight: bold; }
                .cyan { fill: #00FFFF; }
                .magenta { fill: #FF00FF; font-weight: bold; }
                .yellow { fill: #FFFF00; font-weight: bold; }
              </style>
              <g class="txt" xml:space="preserve">
                <text x="20" y="30" class="green">$ htop --user ${username}</text>
                
                <text x="40" y="70">1 [<tspan class="green">${cpuBar}</tspan>] <tspan class="yellow">${cpuUsage.toString().padStart(3, ' ')}.0%</tspan>  Tasks:  ${user.public_repos.toString().padStart(4, ' ')} repos, ${totalCommits} commits</text>
                <text x="40" y="95">2 [<tspan class="green">${memBar}</tspan>] <tspan class="yellow">${memUsage.toString().padStart(3, ' ')}.0%</tspan>  Uptime: ${diffDays} days (Joined ${joinYear})</text>
                <text x="40" y="120">3 [<tspan class="green">${swpBar}</tspan>] <tspan class="yellow">${swpUsage.toString().padStart(3, ' ')}.0%</tspan>  Stars:  ${totalStars.toString().padStart(4, ' ')} earned, ${totalForks} forks</text>
                
                <text x="20" y="150" class="cyan">--------------------------------------------------------------------------------</text>
                <text x="20" y="180"><tspan class="magenta">Current Streak:</tspan> ${currentStreak.display}</text>
                <text x="20" y="200"><tspan class="magenta">Longest Streak:</tspan> ${longestStreak.display}</text>
                
                <text x="20" y="235" class="green">USER       PID %CPU %MEM    VSZ   RSS TTY      STAT START   TIME COMMAND</text>
                <text x="20" y="255"><tspan class="cyan">${username.padEnd(8, ' ')}</tspan>  1337 99.0 12.0 923.4m 142m pts/1    R+   ${joinYear} 99:99 /bin/dev/code</text>
              </g>
            </svg>`.trim();
            
            // 7. Write SVG file to repo
            fs.writeFileSync('profile-htop.svg', svg);

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-htop.svg
          git commit -m "🤖 generate htop svg" || exit 0
          git push
