name: Generate Custom Htop Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate htop stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = context.repo.owner;
            
            // 1. Fetch User Data
            const { data: user } = await github.rest.users.getByUsername({ username });
            
            // 2. Calculate Uptime
            const joinDate = new Date(user.created_at);
            const now = new Date();
            const diffTime = Math.abs(now - joinDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const joinYear = joinDate.getFullYear();
            
            // 3. Fetch Repos & Stars
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username,
              type: 'owner'
            });
            const totalStars = repos.filter(r => !r.fork).reduce((acc, r) => acc + r.stargazers_count, 0);
            const totalForks = repos.filter(r => !r.fork).reduce((acc, r) => acc + r.forks_count, 0);
            
            // 4. Fetch Commits (using Search API)
            let totalCommits = 0;
            try {
              const { data: commits } = await github.rest.search.commits({
                q: `author:${username}`
              });
              totalCommits = commits.total_count;
            } catch (e) {
              console.log('Commits search failed, defaulting to 0:', e.message);
            }

            // 5. Format ASCII Bars
            function getBar(percent, width=20) {
              const filled = Math.min(width, Math.max(0, Math.round((percent / 100) * width)));
              const empty = width - filled;
              return '[' + '|'.repeat(filled) + ' '.repeat(empty) + ']';
            }
            
            const cpuUsage = Math.floor(Math.random() * 40) + 10; // Randomize load for aesthetics
            const memUsage = Math.min(100, Math.round((repos.length / 100) * 100)); // Repos vs 100%
            const swpUsage = Math.min(100, Math.round((totalCommits / 2000) * 100)); // Commits vs 2k capacity
            
            const cpuBar = getBar(cpuUsage);
            const memBar = getBar(memUsage);
            const swpBar = getBar(swpUsage);
            
            // ANSI escape codes for vibrant colors in GitHub Markdown
            const G = '\x1b[1;32m'; // Bright Green
            const C = '\x1b[1;36m'; // Bright Cyan
            const Y = '\x1b[1;33m'; // Bright Yellow
            const W = '\x1b[1;37m'; // Bright White
            const R = '\x1b[0m';    // Reset
            
            const fmtBar = (b) => `[${G}${b.slice(1, -1)}${R}]`;
            
            const htopAscii = [
              '```ansi',
              `${W}$ htop --user ${username}${R}`,
              '',
              `  1  ${fmtBar(cpuBar)} ${Y}${cpuUsage.toString().padStart(3, ' ')}.0%${R}  ${W}Tasks:${R}  ${user.public_repos.toString().padStart(4, ' ')} repos, ${totalCommits} commits`,
              `  2  ${fmtBar(memBar)} ${Y}${memUsage.toString().padStart(3, ' ')}.0%${R}  ${W}Uptime:${R} ${diffDays} days (Joined ${joinYear})`,
              `  3  ${fmtBar(swpBar)} ${Y}${swpUsage.toString().padStart(3, ' ')}.0%${R}  ${W}Stars:${R}  ${totalStars.toString().padStart(4, ' ')} earned, ${totalForks} forks`,
              `${C}--------------------------------------------------------------------------------${R}`,
              `${G}USER       PID %CPU %MEM    VSZ   RSS TTY      STAT START   TIME COMMAND${R}`,
              `${W}${username.padEnd(8, ' ')}${R}  1337 99.0 12.0 923.4m 142m pts/1    R+   ${joinYear} 99:99 /bin/dev/code`,
              '```'
            ].join('\n');
            
            const formattedAscii = htopAscii;

            // 6. Inject into README
            const readmePath = 'README.md';
            let readmeStr = fs.readFileSync(readmePath, 'utf8');
            
            const startMarker = '<!--START_SECTION:htop-stats-->';
            const endMarker = '<!--END_SECTION:htop-stats-->';
            const regex = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`, 'g');
            
            readmeStr = readmeStr.replace(regex, `${startMarker}\n${formattedAscii}\n${endMarker}`);
            
            fs.writeFileSync(readmePath, readmeStr);

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "🤖 updated custom htop stats" || exit 0
          git push
